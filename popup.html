<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="settings.css" />
    <title>Privacy Spotlight</title>
  </head>
  <body class="popup">
    <main>
      <p class="eyebrow">PRIVACY SPOTLIGHT</p>
      <p id="site" class="site-name">Đang kiểm tra website…</p>
      <div class="toggle"><span>Bật trên website này</span><button id="enabled" class="switch" type="button" role="switch" aria-checked="false" aria-label="Bật trên website này" disabled></button></div>
      <button id="options" type="button">Mở cài đặt</button>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
